[project]
name = "skilltest-sdk"
version = "0.2.1"
description = "Python SDK for the skilltest CLI: run AI-skill tests and natural-language evals from Python, with a typed report contract."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Nick DeRobertis" }]
dependencies = [
    "pydantic>=2.7",
]

[dependency-groups]
dev = [
    "datamodel-code-generator>=0.62.0",
    "pytest>=8",
    "ruff>=0.6",
    "ty>=0.0.1a1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["skilltest_sdk"]

# A platform build drops the prebuilt CLI at skilltest_sdk/_bin/skilltest (which
# is git-ignored), then `scripts/build-python-wheel.sh` retags the wheel for the
# target platform. Listing it as an artifact overrides the VCS-ignore so the
# binary is packed; the pure (py3-none-any) build simply has nothing to match.
artifacts = ["skilltest_sdk/_bin/*"]

[tool.ruff]
line-length = 100
target-version = "py312"
# Generated by `just gen-contract` from schemas/ — not hand-maintained, so not
# held to hand-written style; the drift gate and `ty` still cover them.
extend-exclude = ["skilltest_sdk/_report.py", "skilltest_sdk/_validation.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
