# cargo-deny configuration. Run via `just audit` (and in CI) before publishing
# binaries. Keep this strict: advisories and disallowed licenses fail the run.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses we accept for distributed binaries.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
