# Prove the artifact from a clean checkout: bootstrap, then the full gate.
#
# skilltest ships a cross-platform CLI plus Python and TypeScript plugins, so the
# matrix covers Linux and macOS. Each job installs only what `just bootstrap`
# needs — Rust (+ nextest), uv, and pnpm/Node — then runs `just bootstrap` and
# `just check` (format, lint, type check, unit, and e2e). See references/ci.md.

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # nx affected diffs against a base ref; fetch history so it can.
          fetch-depth: 0

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: plugins/vitest/package.json

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            plugins/vitest/pnpm-lock.yaml

      # Derive the base/head SHAs nx uses to compute the affected project set
      # (last successful run on push, the PR base on pull_request).
      - name: Derive nx affected SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Bootstrap
        run: just bootstrap

      # On a PR, gate only the affected projects (vs the PR base); on push to
      # main, nx-set-shas points at the last green commit. `check-all` (run-many)
      # remains available locally to force every project.
      - name: Check
        run: just check
