# Prove the SDKs actually run the bundled CLI on the host's real platform.
#
# The normal gate (ci.yml) points the SDKs at $SKILLTEST_BIN, so it never
# exercises the binary that ships *inside* the published packages. This builds
# the CLI for each target, packs the real publish-shape packages with the binary
# bundled, installs them into a fresh consumer project, and runs a case through
# each framework plugin with SKILLTEST_BIN unset — so a pass can only come from
# the bundled binary. One job per bundled target.
#
# x86_64-apple-darwin is still built and published (release.yml / publish.yml),
# just not smoked here: the Intel macOS runner (macos-13, now deprecated) queues
# unreliably and would block every PR. The other three targets cover the same
# code paths; the Intel-mac binary build is still proven on the release tag.
#
# Deterministic: it drives skilltest-fake-provider, never a real model. See
# scripts/smoke-{python,npm}-bundle.sh and docs/development.md.

name: bundle-smoke

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: aarch64-apple-darwin, os: macos-14 }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build the CLI and the fake provider
        run: |
          cargo build --release -p skilltest-cli --bin skilltest --target ${{ matrix.target }}
          cargo build --release -p skilltest-cli --bin skilltest-fake-provider \
            --features fake-provider --target ${{ matrix.target }}

      - name: Install workspace deps (for the npm smoke's pack/build)
        run: pnpm install --frozen-lockfile

      - name: Python bundle smoke
        run: |
          bash scripts/smoke-python-bundle.sh ${{ matrix.target }} \
            "target/${{ matrix.target }}/release/skilltest" \
            "target/${{ matrix.target }}/release/skilltest-fake-provider"

      - name: npm bundle smoke
        run: |
          bash scripts/smoke-npm-bundle.sh ${{ matrix.target }} \
            "target/${{ matrix.target }}/release/skilltest" \
            "target/${{ matrix.target }}/release/skilltest-fake-provider"
