# Publish the skilltest packages to their registries on a version tag.
#
# This is the registry counterpart to release.yml (which uploads the CLI
# binaries to the GitHub Release for scripts/install.sh). Push a tag like
# `v0.2.0` and this publishes every package that is not yet on its registry, in
# dependency order:
#
#   crates.io : skilltest-core  -> skilltest-cli
#   PyPI      : skilltest-sdk   -> skilltest-pytest
#   npm       : @skill-test/cli-<os>-<arch> (x4) -> @skill-test/sdk -> @skill-test/vitest
#
# The SDKs bundle the CLI so `pip install skilltest-sdk` / `pnpm add @skill-test/sdk`
# need no separate binary install: the `binaries` job builds the CLI for each
# target on a native runner, then the npm job packs each into its per-platform
# package (@skill-test/cli-<os>-<arch>, an `optionalDependencies` of the SDK that
# the package manager installs only on a matching host) and the PyPI job bundles
# each into a platform wheel (with a pure wheel + sdist as the fallback). The SDK
# resolves the bundled binary at runtime, falling back to $SKILLTEST_BIN/PATH.
#
# The package MANIFESTS are the source of truth for versions, not the tag — each
# package publishes the version in its own manifest, and any version already on
# the registry is skipped. So the three languages can carry independent versions
# (they do today), partial/re-run releases are idempotent, and bumping a single
# package's version + tagging republishes only that package. The tag is just the
# "release now" signal.
#
# Tokens come from the gh-secrets manifest (gh-secrets.json): CARGO_REGISTRY_TOKEN,
# PYPI_API_TOKEN, NPM_TOKEN. The jobs run only on the canonical repo. Each job
# uses the `release` GitHub Environment, so you can add required reviewers in the
# repo settings (Settings -> Environments -> release) for a manual approval gate
# before anything is published; with no protection rules it is a no-op.

name: publish

on:
  push:
    tags: ["v*"]

jobs:
  # Build the CLI for each target on a native runner (no cross-compilation) and
  # hand the binaries to the npm/PyPI jobs as workflow artifacts to bundle. This
  # mirrors release.yml's matrix; release.yml ships the GitHub-Release tarballs,
  # this feeds the registry packages.
  binaries:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    if: github.repository == 'nickderobertis/skilltest' && github.ref_name != 'v0.0.0'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: x86_64-apple-darwin, os: macos-13 }
          - { target: aarch64-apple-darwin, os: macos-14 }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build the CLI
        run: cargo build --release -p skilltest-cli --bin skilltest --target ${{ matrix.target }}

      - name: Upload the binary
        uses: actions/upload-artifact@v4
        with:
          name: skilltest-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/skilltest
          if-no-files-found: error

  crates:
    name: crates.io
    runs-on: ubuntu-latest
    if: github.repository == 'nickderobertis/skilltest' && github.ref_name != 'v0.0.0'
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish skilltest-core then skilltest-cli (skip versions already live)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          ua='skilltest-ci (https://github.com/nickderobertis/skilltest)'

          on_crates_io() { # name version -> 0 if that version is already published
            curl -fsS -A "$ua" "https://crates.io/api/v1/crates/$1/$2" >/dev/null 2>&1
          }

          publish_crate() {
            local crate="$1" version
            version=$(cargo metadata --no-deps --format-version 1 \
              | jq -r ".packages[] | select(.name==\"$crate\") | .version")
            if on_crates_io "$crate" "$version"; then
              echo "skip: $crate@$version already on crates.io"
              return 0
            fi
            echo "publishing: $crate@$version"
            # cargo >=1.66 blocks until the new version is downloadable, so the
            # dependent crate resolves it; poll the API too as a belt-and-braces.
            cargo publish --locked -p "$crate"
            for i in $(seq 1 30); do
              on_crates_io "$crate" "$version" && { echo "live: $crate@$version"; return 0; }
              echo "waiting for $crate@$version in the index ($i)…"; sleep 10
            done
            echo "error: timed out waiting for $crate@$version" >&2; return 1
          }

          publish_crate skilltest-core
          publish_crate skilltest-cli

  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    needs: binaries
    if: github.repository == 'nickderobertis/skilltest' && github.ref_name != 'v0.0.0'
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download the per-target binaries
        uses: actions/download-artifact@v4
        with:
          pattern: skilltest-*
          path: artifacts

      - name: Build & publish skilltest-sdk then skilltest-pytest (skip versions already live)
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          set -euo pipefail

          pyproject_version() { # dir -> version string from [project]
            grep -E '^version *= *"' "$1/pyproject.toml" | head -1 \
              | sed -E 's/^version *= *"([^"]+)".*/\1/'
          }
          on_pypi() { curl -fsS "https://pypi.org/pypi/$1/$2/json" >/dev/null 2>&1; }

          # skilltest-sdk: a platform wheel per target (binary bundled) plus a
          # pure wheel + sdist fallback. build-python-dist.sh reads the binaries
          # from artifacts/skilltest-<target>/skilltest.
          sdk_version=$(pyproject_version sdks/python)
          if on_pypi skilltest-sdk "$sdk_version"; then
            echo "skip: skilltest-sdk $sdk_version already on PyPI"
          else
            echo "publishing: skilltest-sdk $sdk_version (platform wheels + sdist)"
            bash scripts/build-python-dist.sh artifacts sdks/python/dist
            uv publish sdks/python/dist/*
          fi

          # skilltest-pytest: a pure package, built straight from its project.
          pytest_version=$(pyproject_version plugins/pytest)
          if on_pypi skilltest-pytest "$pytest_version"; then
            echo "skip: skilltest-pytest $pytest_version already on PyPI"
          else
            echo "publishing: skilltest-pytest $pytest_version"
            ( cd plugins/pytest && rm -rf dist && uv build && uv publish dist/* )
          fi

  npm:
    name: npm
    runs-on: ubuntu-latest
    needs: binaries
    if: github.repository == 'nickderobertis/skilltest' && github.ref_name != 'v0.0.0'
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Download the per-target binaries
        uses: actions/download-artifact@v4
        with:
          pattern: skilltest-*
          path: artifacts

      - name: Build the SDK then the framework package
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @skill-test/sdk build
          pnpm --filter @skill-test/vitest build

      - name: Publish platform packages, then @skill-test/sdk and @skill-test/vitest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          published_npm() { npm view "$1@$2" version >/dev/null 2>&1; }

          # The per-platform binary packages must publish BEFORE the SDK: its
          # optionalDependencies pin these exact versions (pnpm rewrites the
          # `workspace:*` specifiers on publish).
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu \
                        x86_64-apple-darwin aarch64-apple-darwin; do
            binary="artifacts/skilltest-$target/skilltest"
            if [ ! -f "$binary" ]; then
              echo "notice: no binary for $target — skipping its package"
              continue
            fi
            dir=$(bash scripts/stage-npm-binary.sh "$target" "$PWD/$binary")
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if published_npm "$name" "$version"; then
              echo "skip: $name@$version already on npm"
              continue
            fi
            echo "publishing: $name@$version"
            ( cd "$dir" && pnpm publish --access public --no-git-checks )
          done

          publish_pkg() {
            local dir="$1" name version
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            if published_npm "$name" "$version"; then
              echo "skip: $name@$version already on npm"
              return 0
            fi
            echo "publishing: $name@$version"
            # pnpm publish rewrites the `workspace:*` deps (the SDK's optional
            # platform packages, vitest's SDK dep) to real versions; --no-git-checks
            # because CI runs on a detached tag.
            ( cd "$dir" && pnpm publish --access public --no-git-checks )
          }

          publish_pkg sdks/typescript @skill-test/sdk
          publish_pkg plugins/vitest @skill-test/vitest
