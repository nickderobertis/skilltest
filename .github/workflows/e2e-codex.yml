name: E2E (Codex)

# Live end-to-end check that drives the real `codex` CLI through oneharness via
# the built skilltest binary, scored by the fixed claude-code judge. Needs network
# and two secrets: OPENAI_API_KEY (codex, the harness under test) and
# CLAUDE_CODE_OAUTH_TOKEN (the judge). See docs/e2e.md.
#
# Security: gated to the canonical repo and non-fork PRs so the secrets are never
# reachable by untrusted fork code (GitHub already withholds them from fork PRs;
# the `if` is defense in depth).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-codex-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  live:
    name: codex live e2e
    if: >-
      github.repository == 'nickderobertis/skilltest' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Verify the required secrets are present
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::OPENAI_API_KEY is not set (codex auth). Sync it: gh-secrets manifest sync, or gh secret set OPENAI_API_KEY --repo ${{ github.repository }}"
            exit 1
          fi
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN is not set (the fixed claude-code judge needs it)."
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install oneharness (drives the live check)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          just install-oneharness
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install the codex CLI (harness under test) and claude (judge)
        run: |
          npm install -g @openai/codex @anthropic-ai/claude-code
          codex --version
          claude --version

      # codex does not pick up OPENAI_API_KEY from the env for its API calls; it
      # reads ~/.codex/auth.json. `login --with-api-key` (key on stdin) writes
      # that, switching codex to API-key auth instead of the ChatGPT/websocket
      # path that 401s without an interactive login.
      - name: Authenticate codex with the API key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: printenv OPENAI_API_KEY | codex login --with-api-key

      - name: Live e2e against the real codex CLI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: just test-harness codex
